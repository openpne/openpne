name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-php-8-3:
    name: Smoke (PHP 8.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: php artisan --version

  test:
    name: Test (PHP ${{ matrix.php }}, ${{ matrix.db }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.5']
        db: ['sqlite', 'mysql']
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: openpne_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psecret"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DB_CONNECTION: ${{ matrix.db == 'mysql' && 'mysql' || 'sqlite' }}
      DB_HOST: ${{ matrix.db == 'mysql' && '127.0.0.1' || '' }}
      DB_PORT: ${{ matrix.db == 'mysql' && '3306' || '' }}
      DB_DATABASE: ${{ matrix.db == 'mysql' && 'openpne_test' || ':memory:' }}
      DB_USERNAME: ${{ matrix.db == 'mysql' && 'root' || '' }}
      DB_PASSWORD: ${{ matrix.db == 'mysql' && 'secret' || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - run: composer install --no-interaction --no-progress --prefer-dist
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
      - run: php artisan migrate --force
      - run: php artisan test

  lint:
    name: Lint (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: vendor/bin/pint --test

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
