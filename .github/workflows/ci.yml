name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Decide whether anything outside docs changed; the lanes below run only when code changed and
  # are skipped (via `if`, never paths-ignore) on a docs-only change. A job skipped by `if` reports
  # a "skipped" conclusion, which branch protection treats as satisfied — a paths-ignore filter
  # would instead never report the status, so a required check would wait forever on a docs-only PR.
  # A file is "docs" iff it is a *.md (any depth), under docs/, or LICENSE; anything else is code.
  # On an unknown base (first push / force-push) or no diff, fall back to running the full CI.
  #
  # NOTE: the required-checks set must include this "Detect changed paths" job, not just the lanes:
  # the lanes report "skipped" on docs-only PRs, so a broken `changes` job (which skips them via
  # `needs`) must not let a code PR merge untested — making `changes` itself required closes that.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect non-docs changes
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          docs_re='(^|/)[^/]+\.md$|^docs/|^LICENSE$'

          if [ "$EVENT" = "pull_request" ]; then
            base="${BASE_SHA:-}"
          else
            base="${BEFORE_SHA:-}"
          fi

          # Never skip on uncertainty: unknown/absent base => run the full CI.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "base commit unavailable; running full CI"
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files="$(git diff --name-only "$base" "$HEAD_SHA")"
          echo "changed files:"
          printf '%s\n' "$files"

          if [ -z "$files" ]; then
            echo "no changed files; running full CI"
            echo "code=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$files" | grep -qvE "$docs_re"; then
            echo "non-docs change detected; running code lanes"
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs-only change; skipping code lanes"
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  smoke-php-8-3:
    name: Smoke (PHP 8.3)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - uses: ramsey/composer-install@v3
      - run: php artisan --version

  # The sqlite lane and the mysql required check (its aggregator, below) are standalone jobs, not
  # matrix combinations, so the `if` gate produces stable, named "skipped" checks on a docs-only PR.
  # A job-level `if` on a matrix job is evaluated before the matrix expands, so the per-combination
  # check names may never be created — leaving a required check pending forever. The mysql shards
  # sidestep this by being non-required; see the aggregator note below.
  test-sqlite:
    name: Test (PHP 8.5, sqlite)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: ':memory:'
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
      - uses: ramsey/composer-install@v3
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
      - run: php artisan migrate --force
      - run: php artisan test --parallel

  # The mysql suite is the CI long-pole, so its work fans out across a matrix of internal shard jobs
  # and a fixed-name aggregator reports the single required status. paratest's --functional splits
  # work at the method level, making --shard=i/N a disjoint, complete partition; round-robin spreads
  # the heavy Upgrade methods evenly across shards. The shard matrix is deliberately NOT a required
  # check (see the per-combination trap above) — the aggregator below carries the required name.
  mysql-shard:
    name: mysql shard ${{ matrix.shard }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: openpne_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psecret"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_DATABASE: openpne_test
      DB_USERNAME: root
      DB_PASSWORD: secret
      # laravel/pao rewrites test output when it detects an agent env; pin it off for deterministic CI.
      PAO_DISABLE: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
      - uses: ramsey/composer-install@v3
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
      - run: php artisan migrate --force
      # --functional shards at the method level so --shard=i/N is a disjoint, complete split;
      # --fail-on-empty-test-suite turns a mis-targeted shard (0 tests) into a failure, not a pass.
      - run: >-
          php artisan test --parallel --functional
          --shard-test-distribution=round-robin
          --shard=${{ matrix.shard }}/${{ strategy.job-total }}
          --fail-on-empty-test-suite

  # Fixed-name required check: the ruleset requires "Test (PHP 8.5, mysql)". Runs on every PR
  # (if: always()) and reports the shard matrix's aggregate result; on a docs-only PR the shards are
  # skipped and this still reports success. Fail-closed on any unexpected changes/shard state.
  test-mysql:
    name: Test (PHP 8.5, mysql)
    needs: [changes, mysql-shard]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate mysql shard results
        env:
          CHANGES: ${{ needs.changes.result }}
          CODE: ${{ needs.changes.outputs.code }}
          SHARDS: ${{ needs.mysql-shard.result }}
        run: |
          set -euo pipefail
          case "$CODE" in true | false) ;; *) echo "::error::invalid changes.code output '$CODE'"; exit 1 ;; esac
          [ "$CHANGES" = success ] || { echo "::error::changes detector did not succeed ($CHANGES)"; exit 1; }
          if [ "$CODE" != true ]; then echo "docs-only change; mysql shards skipped; reporting success"; exit 0; fi
          [ "$SHARDS" = success ] || { echo "::error::mysql shard(s) did not succeed ($SHARDS)"; exit 1; }
          echo "all mysql shards passed"

  lint:
    name: Lint (Pint)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
      - uses: ramsey/composer-install@v3
      - run: vendor/bin/pint --test

  frontend:
    name: Frontend (type-check + build)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
