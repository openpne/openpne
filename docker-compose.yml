# OpenPNE local development stack — NOT a production deployment.
#   docker compose up -d   →   http://localhost:8080   (caught mail → http://localhost:8025)
#
# Tuned for the inner loop: source is bind-mounted, Vite serves HMR, outgoing mail
# is caught by Mailpit, and queued work runs inline (QUEUE_CONNECTION=sync) so mail
# appears immediately without a worker. A production stack (released image, real
# DB/SMTP, queue worker + scheduler) is deliberately separate.
#
# - `vendor/` and `node_modules/` live in named volumes so container-side
#   `composer install` / `npm ci` do not collide with host uid ownership.
# - SQLite is used by default; opt in to MySQL via a separate compose file.
# - `vite` runs the Vite dev server on :5173 for HMR; Laravel reads
#   `public/hot` to redirect asset URLs to it. First startup runs `npm ci`.

services:
  app:
    build: .
    # Override .env for the container only: deliver all mail to Mailpit and run queued
    # work inline, so registration/reset mail shows up at :8025 with no worker. php-fpm
    # passes these through (clear_env = no), so they win over .env. Production wires real
    # SMTP and a real queue + worker instead.
    environment:
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      QUEUE_CONNECTION: sync
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      - mailpit

  nginx:
    image: nginx:alpine
    ports:
      - "${OPENPNE_HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/site.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  vite:
    image: node:22-bookworm-slim
    working_dir: /var/www/html
    entrypoint: ["sh", "/var/www/html/docker/vite-dev.sh"]
    command: ["npm", "run", "dev"]
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules

  # Dev mail sink: catches every outgoing mail instead of delivering it and shows
  # it at http://localhost:8025. The app reaches it over SMTP on the compose network.
  mailpit:
    image: axllent/mailpit
    ports:
      - "${OPENPNE_MAILPIT_PORT:-8025}:8025"

volumes:
  vendor:
  node_modules:
