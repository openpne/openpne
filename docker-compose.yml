# Single-site OpenPNE 4 development / self-host stack.
#   docker compose up -d   →   http://localhost:8080
#
# - Source is bind-mounted so edits are reflected immediately.
# - `vendor/` and `node_modules/` live in named volumes so container-side
#   `composer install` / `npm ci` do not collide with host uid ownership.
# - SQLite is used by default; opt in to MySQL via a separate compose file.
# - `vite` runs the Vite dev server on :5173 for HMR; Laravel reads
#   `public/hot` to redirect asset URLs to it. First startup runs `npm ci`.

services:
  app:
    build: .
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor

  nginx:
    image: nginx:alpine
    ports:
      - "${OPENPNE_HTTP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/site.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  vite:
    image: node:22-bookworm-slim
    working_dir: /var/www/html
    command: sh /var/www/html/docker/vite-dev.sh
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules

volumes:
  vendor:
  node_modules:
